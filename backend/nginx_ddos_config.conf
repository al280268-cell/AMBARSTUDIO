# AMBAR STUDIO - NGINX Anti-DDoS & Cloudflare Configuration
# This file serves as a reference for deploying the app in production.

# 1. Cloudflare Real IP Configuration
# When using Cloudflare, the real user IP is in CF-Connecting-IP.
# This ensures rate limiting works per actual user, not per Cloudflare server.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# 2. Rate Limiting Zones (Memory allocation for tracking IPs)
# 10m allows tracking ~160,000 IP addresses.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

server {
    listen 80;
    server_name api.ambar.studio;

    # 3. Timeouts (Mitigates Slowloris attacks)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # 4. Max Body Size (Prevents memory exhaustion on uploads)
    client_max_body_size 5M;

    location / {
        # 5. Apply Connection & Rate Limits
        # Max 10 simultaneous connections per IP
        limit_conn addr_limit 10;
        
        # Max 10 requests per second, with a burst of 20 (queue)
        # nodelay means it drops requests over the burst instantly
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
